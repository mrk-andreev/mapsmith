name: Manual Performance Benchmarks

on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: "JMH benchmark regex, optionally followed by JMH arguments"
        required: true
        default: ".*"

jobs:
  jmh:
    runs-on:
      - self-hosted
      - mapsmith-perf

    steps:
      - uses: actions/checkout@v6

      - name: Run JMH
        run: |
          mkdir -p mapsmith-benchmarks/build/benchmarks
          ./gradlew :mapsmith-benchmarks:jmh \
            --args="${{ inputs.benchmark }} -rf json -rff $GITHUB_WORKSPACE/mapsmith-benchmarks/build/benchmarks/jmh-results.json"

      - name: Add EC2 metadata to benchmark report
        env:
          RESULTS_DIR: ${{ github.workspace }}/mapsmith-benchmarks/build/benchmarks
          IMDS_BASE_URL: http://169.254.169.254/latest
        run: |
          imds_token="$(curl --fail --silent --show-error --request PUT \
            --header 'X-aws-ec2-metadata-token-ttl-seconds: 60' \
            "$IMDS_BASE_URL/api/token")"
          imds_get() {
            curl --fail --silent --show-error \
              --header "X-aws-ec2-metadata-token: $imds_token" \
              "$IMDS_BASE_URL/meta-data/$1"
          }

          jq -n \
            --arg instance_id "$(imds_get instance-id)" \
            --arg instance_type "$(imds_get instance-type)" \
            --arg availability_zone "$(imds_get placement/availability-zone)" \
            --arg region "$(imds_get placement/region)" \
            --slurpfile benchmarks "$RESULTS_DIR/jmh-results.json" \
            '{
              ec2: {
                instance_id: $instance_id,
                instance_type: $instance_type,
                availability_zone: $availability_zone,
                region: $region
              },
              benchmarks: $benchmarks[0]
            }' > "$RESULTS_DIR/benchmark-report.json"

      - name: Upload JMH results
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: mapsmith-benchmarks/build/benchmarks/
